spring:
  application:
    name: recon-system
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/recondb
    username: ${DB_USER:recon_user}
    password: ${DB_PASS:recon_pass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 500
          order_inserts: true
          order_updates: true
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  batch:
    jdbc:
      initialize-schema: always
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

recon:
  landing-zone:
    mode: local
    path: ${LANDING_ZONE_PATH:/data/landing}
    poll-interval-ms: 5000
  kafka:
    topics:
      file-arrived: recon.file.arrived
      processing-completed: recon.processing.completed
      break-alerts: recon.break.alerts
  processing:
    chunk-size: 1000
    tolerance:
      default: 0.00
      low-threshold: 1000
      medium-threshold: 10000
      high-threshold: 100000
  notification:
    slack-webhook-url: ${SLACK_WEBHOOK_URL:}
    jira-url: ${JIRA_URL:}
    jira-project-key: RECON
    email:
      to: ${ALERT_EMAIL:ops@company.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  otlp:
    tracing:
      endpoint: ${OTEL_ENDPOINT:http://localhost:4318/v1/traces}
    metrics:
      export:
        endpoint: ${OTEL_ENDPOINT:http://localhost:4318/v1/metrics}
  tracing:
    sampling:
      probability: 1.0

